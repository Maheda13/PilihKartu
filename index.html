<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clap - No Clap</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fff1e6 0%, #fef6e4 45%, #eef7f0 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #262624;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 620px;
    text-align: center;
    background: #ffffff;
    border-radius: 28px;
    padding: 40px 32px;
    box-shadow: 0 12px 40px rgba(120, 90, 40, 0.12);
  }
  h1 {
    font-size: 34px;
    font-weight: 700;
    margin: 0 0 8px;
    letter-spacing: -0.5px;
  }
  h1 span.clap { color: #16a34a; }
  h1 span.noclap { color: #dc2626; }
  .subtitle {
    font-size: 21px;
    color: #78766e;
    margin: 0 0 30px;
    line-height: 1.7;
  }
  .subtitle b { color: #262624; }
  .subtitle .tag-clap { color: #16a34a; font-weight: 700; }
  .subtitle .tag-noclap { color: #dc2626; font-weight: 700; }
  .btn-row {
    display: flex;
    flex-direction: row;
    justify-content: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  .lvl-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 140px;
    height: 140px;
    flex: 0 0 auto;
    font-family: inherit;
    padding: 16px;
    border-radius: 20px;
    border: 2px solid #f0ece0;
    background: #fffdf9;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .lvl-btn:hover {
    border-color: #f0b84d;
    background: #fff8ec;
    transform: translateY(-2px);
  }
  .lvl-btn:active { transform: scale(0.98); }
  .lvl-emoji { font-size: 32px; }
  .lvl-text-title { font-size: 18px; font-weight: 700; margin: 0; }

  #stage { text-align: center; }
  #progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 0 20px;
  }
  #progress-bar-bg {
    flex: 1;
    height: 8px;
    background: #f0ece0;
    border-radius: 8px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #f0b84d, #f97316);
    border-radius: 8px;
    transition: width 0.25s ease;
  }
  #progress-label {
    font-size: 13px;
    color: #918e84;
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }
  #fruitDisplay {
    width: 340px;
    height: 340px;
    max-width: 100%;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #fffdf9, #fbf6ec);
    border-radius: 28px;
    border: 2px solid #f5efe1;
  }
  #fruitDisplay img {
    width: 260px;
    height: 260px;
    animation: pop 0.28s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.75); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  #nextBtn {
    font-family: inherit;
    margin-top: 26px;
    background: #1a1a18;
    color: white;
    border: none;
    font-size: 17px;
    font-weight: 600;
    padding: 16px 36px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  #nextBtn:hover { background: #333330; transform: translateY(-2px); }
  #nextBtn:active { transform: scale(0.97); }
  #keyHint {
    margin-top: 14px;
    font-size: 12px;
    color: #b5b2a8;
  }
  kbd {
    background: #f0ece0;
    border-radius: 5px;
    padding: 2px 7px;
    font-family: inherit;
    font-size: 11px;
    color: #6b6a66;
  }

  #endScreen p { font-size: 19px; font-weight: 600; margin: 0 0 22px; }
  #restartBtn {
    font-family: inherit;
    background: #16a34a;
    color: white;
    border: none;
    font-size: 16px;
    font-weight: 600;
    padding: 14px 30px;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  #restartBtn:hover { background: #128a3e; transform: translateY(-2px); }

  .attribution {
    margin-top: 28px;
    font-size: 11px;
    color: #cbc8bd;
  }
  .attribution a { color: #cbc8bd; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">

  <div id="levelSelect">
    <h1>👏 Clap <span class="clap">-</span> No Clap</h1>
    <p class="subtitle">
      Tepuk tangan <b>1x</b> saat melihat <span class="tag-clap">APEL</span>,<br>
      jangan tepuk saat melihat <span class="tag-noclap">JERUK</span>.
    </p>
    <div class="btn-row">
      <button class="lvl-btn" data-level="1">
        <span class="lvl-emoji">🙂</span>
        <span class="lvl-text-title">Level 1</span>
      </button>
      <button class="lvl-btn" data-level="2">
        <span class="lvl-emoji">🤔</span>
        <span class="lvl-text-title">Level 2</span>
      </button>
      <button class="lvl-btn" data-level="3">
        <span class="lvl-emoji">🌀</span>
        <span class="lvl-text-title">Level 3</span>
      </button>
    </div>
  </div>

  <div id="stage" class="hidden">
    <div id="progress-wrap">
      <div id="progress-bar-bg"><div id="progress-bar-fill" style="width:0%;"></div></div>
      <span id="progress-label"></span>
    </div>
    <div id="fruitDisplay"></div>
    <button id="nextBtn">Gambar Berikutnya ▶</button>
    <p id="keyHint">Tekan <kbd>spasi</kbd> atau <kbd>→</kbd> untuk lanjut</p>
  </div>

  <div id="endScreen" class="hidden">
    <p>🎉 Level selesai!</p>
    <button id="restartBtn">Kembali ke Menu Level</button>
  </div>

  <p class="attribution">Ikon buah oleh <a href="https://twemoji.twitter.com/" target="_blank" rel="noopener">Twemoji</a> (CC BY 4.0), warna dimodifikasi</p>
</div>

<script>
(function(){
  // Ikon dasar dari Twemoji (Twitter), CDN jsDelivr, lisensi CC BY 4.0
  // Untuk varian warna yang tidak tersedia sebagai emoji asli (apel oranye,
  // jeruk merah, jeruk hijau), bentuk emoji asli dipertahankan dan warnanya
  // digeser memakai CSS filter (hue-rotate/saturate) supaya pemain harus
  // fokus ke BENTUK, bukan warna.
  const TWEMOJI_BASE = 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/';
  const CP = {
    apel_merah: '1f34e',
    apel_hijau: '1f34f',
    jeruk: '1f34a',
  };

  const QUESTIONS_PER_LEVEL = 20;

  const levelPools = {
    1: {
      label: 'Level 1',
      pool: [
        {t:'apel', cp:CP.apel_merah, weight:5},
        {t:'jeruk', cp:CP.jeruk, weight:5},
      ]
    },
    2: {
      label: 'Level 2',
      pool: [
        {t:'apel', cp:CP.apel_merah, weight:3},
        {t:'apel', cp:CP.apel_hijau, weight:3},
        {t:'jeruk', cp:CP.jeruk, weight:5},
      ]
    },
    3: {
      label: 'Level 3',
      pool: [
        // apel asli (merah & hijau)
        {t:'apel', cp:CP.apel_merah, weight:2},
        {t:'apel', cp:CP.apel_hijau, weight:2},
        // apel oranye: bentuk apel, warna digeser ke oranye
        {t:'apel', cp:CP.apel_merah, weight:2, filter:'hue-rotate(25deg) saturate(1.3)'},
        // jeruk asli (oranye)
        {t:'jeruk', cp:CP.jeruk, weight:2},
        // jeruk merah: bentuk jeruk, warna digeser ke merah
        {t:'jeruk', cp:CP.jeruk, weight:2, filter:'hue-rotate(-35deg) saturate(1.4)'},
        // jeruk hijau: bentuk jeruk, warna digeser ke hijau
        {t:'jeruk', cp:CP.jeruk, weight:2, filter:'hue-rotate(90deg) saturate(1.2)'},
      ]
    },
  };

  function weightedPick(pool){
    const total = pool.reduce(function(s,p){ return s + p.weight; }, 0);
    let r = Math.random() * total;
    for(let i=0;i<pool.length;i++){
      r -= pool[i].weight;
      if(r <= 0) return pool[i];
    }
    return pool[pool.length-1];
  }

  function buildQuestions(lvl){
    const pool = levelPools[lvl].pool;
    const items = [];
    let lastType = null;
    let streak = 0;
    for(let i=0;i<QUESTIONS_PER_LEVEL;i++){
      let pick = weightedPick(pool);
      // batasi maksimal 3 kali berturut-turut tipe yang sama biar tidak monoton
      if(pick.t === lastType){
        streak++;
        if(streak >= 3){
          const alt = pool.filter(function(p){ return p.t !== lastType; });
          if(alt.length) pick = alt[Math.floor(Math.random()*alt.length)];
          streak = 0;
        }
      } else {
        streak = 0;
      }
      lastType = pick.t;
      items.push(pick);
    }
    return items;
  }

  function fruitImg(item){
    const style = item.filter ? ' style="filter:'+item.filter+'"' : '';
    return '<img src="'+TWEMOJI_BASE+item.cp+'.svg" alt="buah"'+style+'>';
  }

  let currentLevel = null, queue = [], idx = 0;

  const levelSelect = document.getElementById('levelSelect');
  const stage = document.getElementById('stage');
  const endScreen = document.getElementById('endScreen');
  const fruitDisplay = document.getElementById('fruitDisplay');
  const progressBarFill = document.getElementById('progress-bar-fill');
  const progressLabel = document.getElementById('progress-label');
  const nextBtn = document.getElementById('nextBtn');
  const restartBtn = document.getElementById('restartBtn');

  function startLevel(lvl){
    currentLevel = lvl;
    queue = buildQuestions(lvl);
    idx = 0;
    levelSelect.classList.add('hidden');
    endScreen.classList.add('hidden');
    stage.classList.remove('hidden');
    showCurrent();
  }

  function showCurrent(){
    if(idx >= queue.length){
      stage.classList.add('hidden');
      endScreen.classList.remove('hidden');
      return;
    }
    const item = queue[idx];
    progressLabel.textContent = (idx+1) + ' / ' + queue.length;
    progressBarFill.style.width = (((idx+1)/queue.length)*100) + '%';
    fruitDisplay.innerHTML = fruitImg(item);
  }

  document.querySelectorAll('.lvl-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ startLevel(parseInt(btn.dataset.level)); });
  });

  nextBtn.addEventListener('click', function(){ idx++; showCurrent(); });

  restartBtn.addEventListener('click', function(){
    endScreen.classList.add('hidden');
    levelSelect.classList.remove('hidden');
  });

  document.addEventListener('keydown', function(e){
    if((e.code === 'Space' || e.code === 'ArrowRight') && !stage.classList.contains('hidden')){
      e.preventDefault();
      nextBtn.click();
    }
  });
})();
</script>
</body>
</html>
